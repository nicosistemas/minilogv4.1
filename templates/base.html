<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniLog{% block title %}{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        h1 { font-size: 2em; margin-bottom: 4px; }
        h2 { font-size: 1.2em; margin: 16px 0; font-weight: normal; color: #aaa; }

        .subtitle a { color: #aaa; font-size: 0.9em; text-decoration: none; }
        .subtitle a:hover { text-decoration: underline; }

        input, select {
            padding: 8px;
            font-size: 1.1em;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
        }

        button, .btn {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            color: #fff;
            text-decoration: none;
            display: inline-block;
        }

        .btn-green  { background: #4CAF50; }
        .btn-blue   { background: #007BFF; }
        .btn-gray   { background: #555; }
        .btn-red    { background: #c0392b; }

        .btn:hover, button:hover { opacity: 0.85; }

        .flash-messages { margin: 10px auto; max-width: 400px; }
        .flash-error    { background: #c0392b; padding: 8px 12px; border-radius: 4px; margin-bottom: 6px; }
        .flash-info     { background: #2980b9; padding: 8px 12px; border-radius: 4px; margin-bottom: 6px; }

        a { color: #fff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>MiniLog</h1>
    <p class="subtitle">
        by <a href="https://github.com/nicosistemas/MiniLog-lu2fti/tree/main" target="_blank">LU2FTI</a>
    </p>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-messages">
        {% for category, message in messages %}
        <div class="flash-{{ category }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</body>
</html>
