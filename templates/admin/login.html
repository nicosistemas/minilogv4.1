{% extends "base.html" %}
{% block title %} — Admin{% endblock %}
{% block content %}
<style>
.auth-box { margin: 40px auto; max-width: 320px; text-align: left; }
.auth-box label { display: block; margin-bottom: 4px; color: #aaa; font-size: 0.9em; }
.auth-box input { width: 100%; margin-bottom: 14px; }
.auth-box button { width: 100%; }
</style>
<div class="auth-box">
    <h2>Panel de Administración</h2>
    <p style="color:#aaa;font-size:0.85em;margin-bottom:16px;">Acceso restringido al administrador del sistema.</p>
    <form method="POST">
        <label>Contraseña de Admin</label>
        <input type="password" name="password" required autofocus>
        <button type="submit" class="btn-green">Ingresar</button>
    </form>
    <br>
    <a href="{{ url_for('auth.login') }}" style="color:#aaa;font-size:0.85em;">⬅ Volver al login de operadores</a>
</div>
{% endblock %}
