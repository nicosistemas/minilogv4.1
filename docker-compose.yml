version: "3.9"

services:
  minilog:
    build: .
    container_name: minilog_app
    restart: always
    expose:
      - "5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-changeme-in-production}
      - STORAGE_BACKEND=csv
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin1234}
    volumes:
      - ./data:/app/data
      - ./cty.dat:/app/cty.dat:ro

  nginx:
    image: nginx:alpine
    container_name: minilog_nginx
    restart: always
    ports:
      - "5001:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - minilog
